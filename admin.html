<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  doc,
  getDoc,
  onSnapshot,
  writeBatch,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBH-syyf18w7W7iQsOT3um_eYRdCxNJH20",
  authDomain: "rifa-fresita-linda.firebaseapp.com",
  projectId: "rifa-fresita-linda",
  storageBucket: "rifa-fresita-linda.firebasestorage.app",
  messagingSenderId: "1006106726360",
  appId: "1:1006106726360:web:c2387bbc29523e76f7acad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let unsub = null;

// LOGIN
loginForm.onsubmit = async (e) => {

  e.preventDefault();

  loginMsg.textContent = "Iniciando sesión...";

  try {

    const cred = await signInWithEmailAndPassword(
      auth,
      email.value.trim(),
      password.value
    );

    const adminRef = doc(db, "admins", cred.user.uid);
    const adminSnap = await getDoc(adminRef);

    if (!adminSnap.exists()) {

      await signOut(auth);

      loginMsg.textContent =
        "Este usuario no tiene permisos de administrador.";

      return;
    }

    loginMsg.textContent = "";

  } catch (error) {

    console.error(error);

    switch (error.code) {

      case "auth/invalid-credential":
      case "auth/wrong-password":
      case "auth/user-not-found":
        loginMsg.textContent =
          "Correo o contraseña incorrectos.";
        break;

      case "permission-denied":
        loginMsg.textContent =
          "No tienes permisos para acceder.";
        break;

      default:
        loginMsg.textContent =
          "Error: " + error.code;
    }

  }

};

// CERRAR SESIÓN
logout.onclick = () => signOut(auth);

// CAMBIO DE ESTADO
onAuthStateChanged(auth, (user) => {

  login.classList.toggle("hidden", !!user);
  panel.classList.toggle("hidden", !user);

  if (user) {

    escuchar();

  } else {

    if (unsub) unsub();

  }

});

// ESCUCHAR REGISTROS
function escuchar() {

  unsub = onSnapshot(

    collection(db, "registrations"),

    (snapshot) => {

      let datos = [];

      snapshot.forEach((docu) => {

        datos.push({
          id: docu.id,
          ...docu.data()
        });

      });

      datos.sort((a, b) => a.number - b.number);

      dibujar(datos);

    },

    (error) => {

      console.error(error);

      rows.innerHTML =
        "<tr><td colspan='6'>No tienes permisos para leer los datos.</td></tr>";

    }

  );

}

// EVITAR HTML
function esc(valor) {

  return String(valor ?? "").replace(/[&<>"']/g, (c) => ({

    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"

  })[c]);

}

// DIBUJAR TABLA
function dibujar(lista) {

  rows.innerHTML = "";

  let reservados = 0;
  let vendidos = 0;

  lista.forEach((x) => {

    if (x.status === "reserved")
      reservados++;
    else
      vendidos++;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><b>${x.number}</b></td>
      <td>${esc(x.name)}</td>
      <td>${esc(x.phone)}<br>${esc(x.email)}</td>
      <td>${esc(x.address)}</td>
      <td>${x.status === "sold" ? "Vendido" : "Reservado"}</td>
      <td>
        <div class="actions">
          <button class="btn sold" data-s="${x.id}">
            Marcar vendido
          </button>

          <button class="btn release" data-r="${x.id}">
            Liberar
          </button>
        </div>
      </td>
    `;

    rows.appendChild(tr);

  });

  summary.textContent =
    `${50 - lista.length} disponibles · ${reservados} reservados · ${vendidos} vendidos`;

  document.querySelectorAll("[data-s]").forEach((b) => {

    b.onclick = () => marcarVendido(b.dataset.s);

  });

  document.querySelectorAll("[data-r]").forEach((b) => {

    b.onclick = () => liberarNumero(b.dataset.r);

  });

}

// MARCAR VENDIDO
async function marcarVendido(id) {

  if (!confirm("¿Marcar como vendido?")) return;

  const batch = writeBatch(db);

  batch.update(doc(db, "registrations", id), {

    status: "sold",
    updatedAt: serverTimestamp()

  });

  batch.update(doc(db, "publicNumbers", id), {

    status: "sold",
    updatedAt: serverTimestamp()

  });

  await batch.commit();

}

// LIBERAR
async function liberarNumero(id) {

  if (!confirm("¿Liberar número?")) return;

  const batch = writeBatch(db);

  batch.delete(doc(db, "registrations", id));

  batch.delete(doc(db, "publicNumbers", id));

  await batch.commit();

}

</script>

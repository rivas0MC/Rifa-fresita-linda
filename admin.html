<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel de administración</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#fff8fc;color:#38243a}.wrap{width:min(1100px,94%);margin:auto}header{background:linear-gradient(90deg,#db2777,#7c3aed);color:#fff;padding:20px}.card{background:#fff;border-radius:20px;padding:20px;margin:20px 0;box-shadow:0 15px 35px #581c8720}input{width:100%;box-sizing:border-box;padding:12px;margin:6px 0 12px;border:1px solid #ddd;border-radius:11px}.btn{border:0;border-radius:11px;padding:10px 14px;font-weight:850;cursor:pointer}.primary{background:#7c3aed;color:#fff}.sold{background:#16a34a;color:#fff}.release{background:#dc2626;color:#fff}.hidden{display:none}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}.actions{display:flex;gap:6px;flex-wrap:wrap}.error{color:#b91c1c;font-weight:700}@media(max-width:760px){table,thead,tbody,tr,th,td{display:block}thead{display:none}tr{border:1px solid #ddd;border-radius:12px;padding:8px;margin:10px 0}td{border:0}}
</style>
</head>
<body>
<header><div class="wrap"><h1>Panel de administración</h1></div></header>
<main class="wrap">
<section id="login" class="card">
<h2>Iniciar sesión</h2>
<form id="loginForm">
<input id="email" type="email" placeholder="Correo" required>
<input id="password" type="password" placeholder="Contraseña" required>
<button class="btn primary" type="submit">Entrar</button>
<p id="loginMsg"></p>
</form>
</section>
<section id="panel" class="hidden">
<div class="card"><button id="logout" class="btn" type="button">Cerrar sesión</button> <a href="index.html">Volver</a><h2 id="summary">Cargando...</h2></div>
<div class="card"><div style="overflow:auto"><table><thead><tr><th>Número</th><th>Nombre</th><th>Contacto</th><th>Domicilio</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="rows"></tbody></table></div></div>
</section>
</main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, onSnapshot, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyBH-syyf18w7W7iQsOT3um_eYRdCxNJH20",authDomain:"rifa-fresita-linda.firebaseapp.com",projectId:"rifa-fresita-linda",storageBucket:"rifa-fresita-linda.firebasestorage.app",messagingSenderId:"1006106726360",appId:"1:1006106726360:web:c2387bbc29523e76f7acad"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
const loginSection=document.getElementById("login"),panelSection=document.getElementById("panel"),loginForm=document.getElementById("loginForm"),emailInput=document.getElementById("email"),passwordInput=document.getElementById("password"),loginMsg=document.getElementById("loginMsg"),logoutBtn=document.getElementById("logout"),rows=document.getElementById("rows"),summary=document.getElementById("summary");
let unsub=null;

loginForm.addEventListener("submit",async(e)=>{e.preventDefault();loginMsg.className="";loginMsg.textContent="Iniciando sesión...";try{const cred=await signInWithEmailAndPassword(auth,emailInput.value.trim(),passwordInput.value);const adminSnap=await getDoc(doc(db,"admins",cred.user.uid));if(!adminSnap.exists()){await signOut(auth);loginMsg.className="error";loginMsg.textContent="Este usuario no tiene permisos de administrador.";return}loginMsg.textContent=""}catch(error){console.error(error);loginMsg.className="error";if(["auth/invalid-credential","auth/wrong-password","auth/user-not-found"].includes(error.code))loginMsg.textContent="Correo o contraseña incorrectos.";else if(error.code==="auth/too-many-requests")loginMsg.textContent="Demasiados intentos. Espera unos minutos.";else loginMsg.textContent="Error: "+error.code}});
logoutBtn.addEventListener("click",()=>signOut(auth));

onAuthStateChanged(auth,async(user)=>{if(user){const adminSnap=await getDoc(doc(db,"admins",user.uid));if(!adminSnap.exists()){await signOut(auth);return}loginSection.classList.add("hidden");panelSection.classList.remove("hidden");escuchar()}else{loginSection.classList.remove("hidden");panelSection.classList.add("hidden");if(unsub){unsub();unsub=null}}});

function escuchar(){if(unsub)unsub();unsub=onSnapshot(collection(db,"registrations"),(snapshot)=>{const datos=[];snapshot.forEach((d)=>datos.push({id:d.id,...d.data()}));datos.sort((a,b)=>a.number-b.number);dibujar(datos)},(error)=>{console.error(error);rows.innerHTML="<tr><td colspan='6'>No tienes permisos para leer los datos.</td></tr>"})}
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
function dibujar(lista){rows.innerHTML="";let reservados=0,vendidos=0;lista.forEach(x=>{if(x.status==="reserved")reservados++;if(x.status==="sold")vendidos++;const tr=document.createElement("tr");tr.innerHTML=`<td><b>${x.number}</b></td><td>${esc(x.name)}</td><td>${esc(x.phone)}<br>${esc(x.email)}</td><td>${esc(x.address)}</td><td>${x.status==="sold"?"Vendido":"Reservado"}</td><td><div class="actions"><button class="btn sold" data-s="${x.id}" type="button">Marcar vendido</button><button class="btn release" data-r="${x.id}" type="button">Liberar</button></div></td>`;rows.appendChild(tr)});summary.textContent=`${50-lista.length} disponibles · ${reservados} reservados · ${vendidos} vendidos`;document.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>marcarVendido(b.dataset.s));document.querySelectorAll("[data-r]").forEach(b=>b.onclick=()=>liberarNumero(b.dataset.r))}
async function marcarVendido(id){if(!confirm("¿Marcar como vendido?"))return;try{const batch=writeBatch(db);batch.update(doc(db,"registrations",id),{status:"sold",updatedAt:serverTimestamp()});batch.update(doc(db,"publicNumbers",id),{status:"sold",updatedAt:serverTimestamp()});await batch.commit()}catch(error){console.error(error);alert("No se pudo marcar como vendido.")}}
async function liberarNumero(id){if(!confirm("¿Liberar número y borrar los datos?"))return;try{const batch=writeBatch(db);batch.delete(doc(db,"registrations",id));batch.delete(doc(db,"publicNumbers",id));await batch.commit()}catch(error){console.error(error);alert("No se pudo liberar el número.")}}
</script>
</body>
</html>

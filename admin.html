<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Administración · Rifa Fresita Linda</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#fff8fc;color:#38243a}.wrap{width:min(1180px,94%);margin:auto}header{background:linear-gradient(90deg,#db2777,#7c3aed);color:#fff;padding:24px 0}
.card{background:#fff;border-radius:22px;padding:22px;margin:22px 0;box-shadow:0 15px 40px #581c8720}input,select{width:100%;padding:12px;border:1px solid #ddd;border-radius:12px;margin:7px 0 14px;font:inherit;box-sizing:border-box}
button{border:0;border-radius:12px;padding:11px 15px;font-weight:850;cursor:pointer}.primary{background:#7c3aed;color:#fff}.sold{background:#16a34a;color:#fff}.release{background:#dc2626;color:#fff}.logout{background:#111;color:#fff}.export{background:#0f766e;color:#fff}
table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}.badge{padding:4px 9px;border-radius:999px;font-weight:800}.reserved{background:#fef3c7}.soldBadge{background:#dcfce7}.hidden{display:none}.actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.toolbar{display:grid;grid-template-columns:1fr 220px auto;gap:10px;align-items:end}.statcards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stat{padding:16px;border-radius:16px;background:#faf5ff;font-weight:900;text-align:center}.error{color:#b91c1c;font-weight:800}
@media(max-width:760px){.toolbar,.statcards{grid-template-columns:1fr}table,thead,tbody,tr,th,td{display:block}thead{display:none}tr{border:1px solid #eee;border-radius:14px;margin:12px 0;padding:10px}td{border:0;padding:5px}}
</style></head><body>
<header><div class="wrap"><h1>Panel de administración</h1><p>Rifa Fresita Linda</p></div></header>
<main class="wrap">
<section id="loginCard" class="card"><h2>Iniciar sesión</h2><form id="loginForm"><label>Correo</label><input id="loginEmail" type="email" required><label>Contraseña</label><input id="loginPassword" type="password" required><button class="primary">Entrar</button><p id="loginMsg"></p></form></section>
<section id="adminArea" class="hidden">
<div class="card"><div class="actions"><button id="logoutBtn" class="logout">Cerrar sesión</button><a href="index.html">Volver a la rifa</a></div>
<div class="statcards"><div class="stat" id="availableStat">0 disponibles</div><div class="stat" id="reservedStat">0 reservados</div><div class="stat" id="soldStat">0 vendidos</div></div></div>
<div class="card">
  <div class="toolbar">
    <div><label>Buscar</label><input id="searchInput" placeholder="Número, nombre, teléfono o correo"></div>
    <div><label>Estado</label><select id="statusFilter"><option value="all">Todos</option><option value="reserved">Reservados</option><option value="sold">Vendidos</option></select></div>
    <button id="exportBtn" class="export">Exportar a Excel (CSV)</button>
  </div>
</div>
<div class="card"><h2>Participantes</h2><div style="overflow:auto"><table><thead><tr><th>Número</th><th>Nombre</th><th>Contacto</th><th>Domicilio</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="rows"></tbody></table></div></div>
</section></main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBH-syyf18w7WZjOsOT3um_eYRdCxNJH2Q",
  authDomain: "rifa-fresita-linda.firebaseapp.com",
  projectId: "rifa-fresita-linda",
  storageBucket: "rifa-fresita-linda.firebasestorage.app",
  messagingSenderId: "1006106726360",
  appId: "1:1006106726360:web:c2387bbc29523e76f7acad",
  measurementId: "G-RB54YTGJJ8"
};

const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
const loginCard=document.getElementById("loginCard"),adminArea=document.getElementById("adminArea"),rows=document.getElementById("rows");
const searchInput=document.getElementById("searchInput"),statusFilter=document.getElementById("statusFilter");
let unsub=null, allData=[];
document.getElementById("loginForm").onsubmit=async e=>{e.preventDefault();const m=document.getElementById("loginMsg");m.textContent="Iniciando sesión…";m.className="";try{const cred=await signInWithEmailAndPassword(auth,document.getElementById("loginEmail").value.trim(),document.getElementById("loginPassword").value);const a=await getDoc(doc(db,"admins",cred.user.uid));if(!a.exists()){await signOut(auth);m.textContent="Este usuario no tiene permisos de administrador.";m.className="error";return;}m.textContent="";}catch(err){console.error(err);m.textContent=err.code==="auth/invalid-credential"?"Correo o contraseña incorrectos.":"Error: "+err.code;m.className="error";}};
document.getElementById("logoutBtn").onclick=()=>signOut(auth);
onAuthStateChanged(auth,async user=>{if(user){const a=await getDoc(doc(db,"admins",user.uid));if(!a.exists()){await signOut(auth);return;}loginCard.classList.add("hidden");adminArea.classList.remove("hidden");listen();}else{loginCard.classList.remove("hidden");adminArea.classList.add("hidden");if(unsub){unsub();unsub=null;}}});
function listen(){unsub=onSnapshot(collection(db,"registrations"),snap=>{allData=[];snap.forEach(d=>allData.push({id:d.id,...d.data()}));allData.sort((a,b)=>a.number-b.number);updateStats();render();},err=>{rows.innerHTML=`<tr><td>No tienes permiso para leer los registros.</td></tr>`;console.error(err);});}
function updateStats(){const r=allData.filter(x=>x.status==="reserved").length,s=allData.filter(x=>x.status==="sold").length;document.getElementById("availableStat").textContent=`${50-r-s} disponibles`;document.getElementById("reservedStat").textContent=`${r} reservados`;document.getElementById("soldStat").textContent=`${s} vendidos`;}
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));}
function filtered(){const q=searchInput.value.trim().toLowerCase(),f=statusFilter.value;return allData.filter(x=>{const hay=[x.number,x.name,x.phone,x.email,x.address].join(" ").toLowerCase();return (!q||hay.includes(q))&&(f==="all"||x.status===f);});}
function render(){rows.innerHTML="";filtered().forEach(r=>{const tr=document.createElement("tr");tr.innerHTML=`<td><b>${r.number}</b></td><td>${esc(r.name)}</td><td>${esc(r.phone)}<br>${esc(r.email)}</td><td>${esc(r.address)}</td><td><span class="badge ${r.status==="sold"?"soldBadge":"reserved"}">${r.status==="sold"?"Vendido":"Reservado"}</span></td><td><div class="actions"><button class="sold" data-sold="${r.id}">Marcar vendido</button><button class="release" data-release="${r.id}">Liberar</button></div></td>`;rows.appendChild(tr);});document.querySelectorAll("[data-sold]").forEach(b=>b.onclick=()=>markSold(b.dataset.sold));document.querySelectorAll("[data-release]").forEach(b=>b.onclick=()=>release(b.dataset.release));}
searchInput.oninput=render;statusFilter.onchange=render;
async function markSold(id){if(!confirm("¿Confirmar como vendido?"))return;const batch=writeBatch(db);batch.update(doc(db,"registrations",id),{status:"sold",updatedAt:serverTimestamp()});batch.update(doc(db,"publicNumbers",id),{status:"sold",updatedAt:serverTimestamp()});await batch.commit();}
async function release(id){if(!confirm("¿Liberar este número y borrar los datos del registro?"))return;const batch=writeBatch(db);batch.delete(doc(db,"registrations",id));batch.delete(doc(db,"publicNumbers",id));await batch.commit();}
document.getElementById("exportBtn").onclick=()=>{const headers=["Numero","Nombre","Telefono","Correo","Domicilio","Estado"];const lines=[headers,...filtered().map(x=>[x.number,x.name,x.phone,x.email,x.address,x.status==="sold"?"Vendido":"Reservado"])].map(row=>row.map(v=>`"${String(v??"").replaceAll('"','""')}"`).join(","));const blob=new Blob(["\ufeff"+lines.join("\n")],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="participantes-rifa.csv";a.click();URL.revokeObjectURL(a.href);};
</script></body></html>
